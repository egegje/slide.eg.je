  <div class="topbar__inner">
    <a class="brand" href="../index.html">
      <svg class="monster-head" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6">

<section class="pad-section">
  <div class="pad-section__head">
    <span class="num">01</span>
    <h2>Pilots</h2>
    <span class="meta">24 IN ROSTER<br>WORLD + RU</span>
  </div>

  <div class="pad-crew" id="crew-grid"></div>
</section>

<footer class="pad-footer">
  <div class="pad-footer__mono">
    <span>© 2026 DRIFT.EG.JE</span>
    <span>Paddock variant · drivers</span>

<script>
window.DRIFT_TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "orange",
  "density": "comfy",
  "motion": true,
  "hero": "video",
  "lang": "ru"
}/*EDITMODE-END*/;
</script>
<script src="../drift-data.js"></script>
<script src="../shared.js"></script>
<script>
(function () {
  function esc(s) { return String(s == null ? '' : s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
  var data = window.DRIFT_DATA || {};
  var list = data.drivers || [];
  var host = document.getElementById('crew-grid');
  if (!host) return;
  host.innerHTML = list.map(function (d) {
    var num = String(d.rank).padStart(2, '0');
    var tape = (d.tags || []).indexOf('champion') >= 0 ? 'CHAMPION' : 'PRO';
    var titles = (d.titles || []).slice(0, 2).map(esc).join(' · ');
    return '' +
      '<div class="pad-crew__card" data-slot="driver-' + esc(d.rank) + '">' +
        '<div class="pad-crew__img">' +
          '<div class="ph' + (d.photo ? ' has-photo' : '') + '"' + (d.photo ? ' style="background-image:url(\'' + esc(d.photo) + '\');background-size:cover;background-position:center"' : '') + ' data-label="' + esc(d.country) + '"></div>' +
          '<span class="pad-crew__tape">' + esc(tape) + '</span>' +
          '<span class="pad-crew__num">' + esc(num) + '</span>' +
        '</div>' +
        '<div class="pad-crew__body">' +
          '<div class="pad-crew__country">' + esc(d.flag || '') + ' ' + esc(d.country) + '</div>' +
          '<div class="pad-crew__name">' + esc(d.name) + '</div>' +
          '<div class="pad-crew__car">' + esc(d.car) + ' · ' + esc(d.engine) + '</div>' +
          '<div class="pad-crew__specs">' +
            '<div><b>' + esc(d.hp) + 'HP</b>POWER</div>' +
            '<div><b>#' + esc(num) + '</b>RANK</div>' +
          '</div>' +
          (titles ? '<div class="pad-crew__titles">' + titles + '</div>' : '') +
        '</div>' +
      '</div>';
  }).join('');
})();
</script>
</body>
</html>
