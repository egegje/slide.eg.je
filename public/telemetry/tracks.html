</head>
<body class="tele-body">

<header class="topbar">
  <div class="topbar__inner">
    <a class="brand" href="../index.html">
      <svg class="monster-head" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M4 4 L14 10 L24 4 L22 16 L26 22 L14 26 L2 22 L6 16 Z" fill="var(--accent)" stroke="none"/>
      </svg>
      DRIFT<b>.EG.JE</b>
    </a>
    <nav class="nav">
      <a href="home.html">Home</a>
      <a href="team.html">Team</a>
      <a href="drivers.html">Drivers</a>

    </nav>
    <div class="topbar__right">
      <a class="btn btn--primary" href="#">Join</a>
    </div>
  </div>
</header>

<section class="tele-section">
  <div class="tele-section__head">
    <div>
      <div class="kicker">LOCATIONS</div>
      <h2>Tracks</h2>
    </div>
    <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;color:var(--fg-dim);text-transform:uppercase;text-align:right">
      5 IN DATABASE<br>
      FLORIDA
    </div>
  </div>

  <div class="tele-tracks" id="tracks-grid"></div>
</section>

<footer class="tele-footer">
  <div class="tele-footer__mono">
    <span>© 2026 DRIFT.EG.JE</span>
    <span>Telemetry variant · tracks</span>
  </div>
</footer>

<script>
window.DRIFT_TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "orange",
  "density": "comfy",
  "motion": true,
  "hero": "video",
  "lang": "ru"
}/*EDITMODE-END*/;
</script>
<script src="../drift-data.js"></script>
<script src="../shared.js"></script>
<script>
(function () {
  function esc(s) { return String(s == null ? '' : s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
  var levelLabel = { 'pro': 'PRO', 'pro-am': 'PRO-AM', 'amateur': 'AMATEUR', 'mixed': 'MIXED' };
  var data = window.DRIFT_DATA || {};
  var list = data.tracks || [];
  var host = document.getElementById('tracks-grid');
  if (!host) return;
  host.innerHTML = list.map(function (t) {
    var lvl = levelLabel[t.level] || t.level || '';
    var desc = t.description || '';
    if (desc.length > 140) desc = desc.slice(0, 137).trim() + '…';
    var series = (t.series || []).join(' · ').toUpperCase() || '—';
    var links = [];
    if (t.mapsUrl) links.push('<a href="' + esc(t.mapsUrl) + '" target="_blank" rel="noopener">MAPS →</a>');
    if (t.website) links.push('<a href="' + esc(t.website) + '" target="_blank" rel="noopener">SITE →</a>');
    return '' +
      '<div class="tele-track" data-slot="track-' + esc(t.slug) + '">' +
        (t.photo
          ? '<div class="tele-track__photo has-photo" style="background-image:url(\'' + esc(t.photo) + '\')"></div>'
          : '<div class="tele-track__photo ph" data-label="TRACK"></div>') +
        '<div class="tele-track__head">' +
          '<div class="tele-track__name">' + esc(t.name) + '</div>' +
          (lvl ? '<span class="tele-track__lvl">' + esc(lvl) + '</span>' : '') +
        '</div>' +
        '<div class="tele-track__rows">' +
          '<div>LOCATION<b>' + esc(t.city) + ', ' + esc(t.region) + '</b></div>' +
          '<div>SERIES<b>' + esc(series) + '</b></div>' +
        '</div>' +
        '<div class="tele-track__desc">' + esc(desc) + '</div>' +
        '<div class="tele-track__links">' + links.join('') + '</div>' +
      '</div>';
  }).join('');
})();
</script>
</body>
</html>
