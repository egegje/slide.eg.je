<body class="apex-body">

<header class="topbar">
  <div class="topbar__inner">
    <a class="brand" href="../index.html">
      <svg class="monster-head" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M4 4 L14 10 L24 4 L22 16 L26 22 L14 26 L2 22 L6 16 Z" fill="var(--accent)" stroke="none"/>
      </svg>
      DRIFT<b>.EG.JE</b>

    <nav class="nav">
      <a href="home.html">Home</a>

      <a class="btn btn--primary" href="#">Join</a>
    </div>
  </div>
</header>

<section class="apex-section">
  <div class="apex-section__head">
    <div>
      <div class="no">Roster</div>
      <h2>Drivers</h2>
    </div>
    <div class="meta">
      24 <span>in roster</span><br>
      <span>world top + RU</span>
    </div>
  </div>

  <div class="apex-drivers" id="drivers-grid"></div>
</section>

<footer class="apex-footer">
  <div class="apex-footer__mono">
    <span>© 2026 DRIFT.EG.JE</span>
    <span>Apex variant · drivers</span>
  </div>
</footer>

<script>
window.DRIFT_TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "orange",
  "density": "comfy",
  "motion": true,
  "hero": "video",
  "lang": "ru"
}/*EDITMODE-END*/;
</script>
<script src="../drift-data.js"></script>
<script src="../shared.js"></script>
<script>
(function () {
  function esc(s) { return String(s == null ? '' : s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
  var data = window.DRIFT_DATA || {};
  var list = data.drivers || [];
  var host = document.getElementById('drivers-grid');
  if (!host) return;
  host.innerHTML = list.map(function (d) {
    var num = String(d.rank).padStart(2, '0');
    var parts = d.name.split(' ');
    var last = parts.pop() || d.name;
    var first = parts.join(' ');
    return '' +
      '<div class="apex-driver">' +
        '<div class="ph' + (d.photo ? ' has-photo' : '') + '" style="position:absolute;inset:0' + (d.photo ? ';background-image:url(\'' + esc(d.photo) + '\');background-size:cover;background-position:center' : '') + '" data-label="' + esc(d.country) + '"></div>' +
        '<div class="apex-driver__num">' + esc(num) + '</div>' +
        '<div class="apex-driver__info">' +
          '<div class="name">' + esc(first) + (first ? '<br>' : '') + esc(last) + '</div>' +
          '<div class="car">' + esc(d.car) + '</div>' +
          '<div class="car" style="color:var(--fg-dim);margin-top:2px">' + esc(d.engine) + ' · ' + esc(d.hp) + ' HP</div>' +
        '</div>' +
      '</div>';
  }).join('');
})();
</script>
</body>
</html>
