<!doctype html>
<html lang="en" data-variant="apex">
<head>
<meta charset="utf-8">
<title>Shop — Apex — drift.eg.je</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="apex.css">
</head>
<body class="apex-body">

<header class="topbar">
  <div class="topbar__inner">
    <a class="brand" href="../index.html">
      <svg class="monster-head" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M4 4 L14 10 L24 4 L22 16 L26 22 L14 26 L2 22 L6 16 Z" fill="var(--accent)" stroke="none"/>
      </svg>
      DRIFT<b>.EG.JE</b>
    </a>
    <nav class="nav">
      <a href="home.html">Home</a>
      <a href="team.html">Team</a>
      <a href="drivers.html">Drivers</a>
      <a href="calendar.html">Calendar</a>
      <a href="tracks.html">Tracks</a>
      <a href="gallery.html">Gallery</a>
      <a class="active" href="shop.html">Shop</a>
    </nav>
    <div class="topbar__right">
      <a class="btn btn--primary" href="#">Join</a>
    </div>
  </div>
</header>

<section class="apex-section">
  <div class="apex-section__head">
    <div>
      <div class="no">Offering</div>
      <h2>Services</h2>
    </div>
    <div class="meta">
      4 <span>directions</span><br>
      <span>Dark Force</span>
    </div>
  </div>

  <div class="apex-services" id="services-grid"></div>
</section>

<footer class="apex-footer">
  <div class="apex-footer__mono">
    <span>© 2026 DRIFT.EG.JE</span>
    <span>Apex variant · shop</span>
  </div>
</footer>

<script>
window.DRIFT_TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "orange",
  "density": "comfy",
  "motion": true,
  "hero": "video",
  "lang": "ru"
}/*EDITMODE-END*/;
</script>
<script src="../drift-data.js"></script>
<script src="../shared.js"></script>
<script>
(function () {
  function esc(s) { return String(s == null ? '' : s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
  var data = window.DRIFT_DATA || {};
  var list = data.services || [];
  var host = document.getElementById('services-grid');
  if (!host) return;
  host.innerHTML = list.map(function (s) {
    var cta = s.contact ? '<a class="btn btn--primary" href="' + esc(s.contact) + '" target="_blank" rel="noopener">' + esc(s.cta || 'Request') + ' →</a>' : '';
    return '' +
      '<div class="apex-service">' +
        '<div class="apex-service__name">' + esc(s.name) + '</div>' +
        '<div class="apex-service__short">' + esc(s.short) + '</div>' +
        '<div class="apex-service__long">' + esc(s.long) + '</div>' +
        '<div class="apex-service__foot">' +
          '<div class="apex-service__price">' + esc(s.price) + '</div>' +
          cta +
        '</div>' +
      '</div>';
  }).join('');
})();
</script>
</body>
</html>
